<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #faf8ef;
            color: #776e65;
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }
        .container {
            width: 340px;
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
            margin: 0;
        }
        .score-container {
            background: #bbada0;
            padding: 5px 15px;
            font-size: 20px;
            height: 40px;
            line-height: 40px;
            font-weight: bold;
            border-radius: 3px;
            color: white;
            min-width: 60px;
        }
        .game-container {
            position: relative;
            padding: 10px;
            background: #bbada0;
            border-radius: 6px;
            width: 320px;
            height: 320px;
            box-sizing: border-box;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            width: 100%;
            height: 100%;
        }
        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.1s ease;
        }
        /* 数字格子样式 */
        .n-2 { background: #eee4da; }
        .n-4 { background: #ede0c8; }
        .n-8 { background: #f2b179; color: #f9f6f2; }
        .n-16 { background: #f59563; color: #f9f6f2; }
        .n-32 { background: #f67c5f; color: #f9f6f2; }
        .n-64 { background: #f65e3b; color: #f9f6f2; }
        .n-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .n-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .n-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .n-1024 { background: #edc53f; color: #f9f6f2; font-size: 20px; }
        .n-2048 { background: #edc22e; color: #f9f6f2; font-size: 20px; }
        
        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .game-over p { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .restart-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
        }
        .restart-btn:hover { background: #9f8a76; }
        .instructions { font-size: 14px; margin-top: 15px; color: #776e65; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>2048</h1>
        <div class="score-container" id="score">0</div>
    </div>

    <div class="game-container">
        <div class="grid-container" id="grid">
            <!-- 16个格子由JS动态渲染 -->
        </div>
        <div class="game-over" id="game-over">
            <p>游戏结束！</p>
            <button class="restart-btn" onclick="resetGame()">重新开始</button>
        </div>
    </div>
    <p class="instructions">使用键盘上的 <b>↑ ↓ ← →</b> 方向键进行游戏。</p>
</div>

<script>
    let board = Array(16).fill(0);
    let score = 0;

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.id = 'cell-' + i;
            grid.appendChild(cell);
        }
        resetGame();
    }

    function resetGame() {
        board.fill(0);
        score = 0;
        document.getElementById('game-over').style.display = 'none';
        addRandomTile();
        addRandomTile();
        updateView();
    }

    function addRandomTile() {
        const emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
        if (emptyCells.length > 0) {
            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[randomCell] = Math.random() < 0.9 ? 2 : 4;
        }
    }

    function updateView() {
        for (let i = 0; i < 16; i++) {
            const cell = document.getElementById('cell-' + i);
            cell.textContent = board[i] === 0 ? '' : board[i];
            cell.className = 'grid-cell' + (board[i] > 0 ? ' n-' + board[i] : '');
        }
        document.getElementById('score').textContent = score;
    }

    function rotate() {
        let newBoard = Array(16).fill(0);
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                newBoard[c * 4 + (3 - r)] = board[r * 4 + c];
            }
        }
        board = newBoard;
    }

    function slideLeft() {
        let moved = false;
        for (let r = 0; r < 4; r++) {
            let row = board.slice(r * 4, r * 4 + 4).filter(v => v !== 0);
            for (let i = 0; i < row.length - 1; i++) {
                if (row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row.splice(i + 1, 1);
                    moved = true;
                }
            }
            while (row.length < 4) row.push(0);
            for (let c = 0; c < 4; c++) {
                if (board[r * 4 + c] !== row[c]) moved = true;
                board[r * 4 + c] = row[c];
            }
        }
        return moved;
    }

    function move(direction) {
        let moved = false;
        // 0: 左, 1: 下, 2: 右, 3: 上
        for (let i = 0; i < direction; i++) rotate();
        moved = slideLeft();
        for (let i = 0; i < (4 - direction) % 4; i++) rotate();

        if (moved) {
            addRandomTile();
            updateView();
            if (isGameOver()) {
                document.getElementById('game-over').style.display = 'flex';
            }
        }
    }

    function isGameOver() {
        if (board.includes(0)) return false;
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                let curr = board[r * 4 + c];
                if (c < 3 && curr === board[r * 4 + c + 1]) return false;
                if (r < 3 && curr === board[(r + 1) * 4 + c]) return false;
            }
        }
        return true;
    }

    window.addEventListener('keydown', function(e) {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            e.preventDefault(); // 阻止方向键滚动网页
        }
        if (e.key === 'ArrowLeft') move(0);
        if (e.key === 'ArrowDown') move(1);
        if (e.key === 'ArrowRight') move(2);
        if (e.key === 'ArrowUp') move(3);
    });

    initGame();
</script>

</body>
</html>
